<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A clean, responsive product review form for submitting user feedback on software engineering utilities.">
    <meta name="author" content="Youssef Nabil Samir">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/review.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form method="get" action="review.html" class="review-form">
            <div class="form-group">
                <label for="product-name">Product Name <span class="required">*</span></label>
                <select id="product-name" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Overall Rating <span class="required">*</span></label>
                <div class="rating-container">
                    <input type="radio" id="star5" name="rating" value="5" required>
                    <label for="star5" title="5 stars">☆</label>
                    
                    <input type="radio" id="star4" name="rating" value="4" required>
                    <label for="star4" title="4 stars">☆</label>
                    
                    <input type="radio" id="star3" name="rating" value="3" required>
                    <label for="star3" title="3 stars">☆</label>
                    
                    <input type="radio" id="star2" name="rating" value="2" required>
                    <label for="star2" title="2 stars">☆</label>
                    
                    <input type="radio" id="star1" name="rating" value="1" required>
                    <label for="star1" title="1 stars">☆</label>
                </div>
            </div>

            <div class="form-group">
                <label for="install-date">Date of Installation <span class="required">*</span></label>
                <input type="date" id="install-date" name="installDate" required>
            </div>

            <div class="form-group">
                <label>Useful Features (Check all that apply)</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="feature-durability" name="features" value="durability">
                        <label for="feature-durability">Durability</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="feature-design" name="features" value="design">
                        <label for="feature-design">Sleek Design</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="feature-performance" name="features" value="performance">
                        <label for="feature-performance">High Performance</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="feature-ease" name="features" value="easeOfUse">
                        <label for="feature-ease">Ease of Use</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="written-review">Written Review (Optional)</label>
                <textarea id="written-review" name="writtenReview" rows="5" placeholder="Share your experience with this product..."></textarea>
            </div>

            <div class="form-group">
                <label for="user-name">Your Name (Optional)</label>
                <input type="text" id="user-name" name="userName" placeholder="e.g., John Doe">
            </div>

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> | Youssef Nabil Samir | Egypt</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
