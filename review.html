<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Confirmation</title>
    <link rel="stylesheet" href="styles.css">
    <script src="review.js" defer></script>
</head>
<body>
    <header>
        <h1>Submission Received</h1>
    </header>

    <main class="confirmation-container">
        <div class="confirmation-card">
            <div class="success-icon">✓</div>
            <h2>Thank You for Your Feedback!</h2>
            <p>Your product review has been successfully recorded and submitted.</p>
            <hr>
            <p class="counter-display">Total Reviews Submitted: <strong id="review-counter">0</strong></p>
            <a href="form.html" class="back-link">Submit Another Review</a>
        </div>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> | Youssef Nabil Samir | Egypt</p>
        <p>Last Modified: <span id="last-modified"></span></p>
    </footer>
</body>
</html>
